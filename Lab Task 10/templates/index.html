<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUE Admission Chatbot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .chat-container {
            width: 440px;
            height: 680px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: linear-gradient(90deg, #1e40af, #3b82f6);
            color: white;
            padding: 18px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .message {
            max-width: 80%;
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 15.5px;
            line-height: 1.5;
        }
        .user-message {
            align-self: flex-end;
            background: #1e40af;
            color: white;
            border-bottom-right-radius: 6px;
        }
        .bot-message {
            align-self: flex-start;
            background: #e2e8f0;
            color: #1e2937;
            border-bottom-left-radius: 6px;
        }
        .input-area {
            padding: 16px;
            background: white;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 10px;
        }
        .input-area input {
            flex: 1;
            padding: 16px 20px;
            border: 2px solid #cbd5e1;
            border-radius: 50px;
            font-size: 16px;
            outline: none;
        }
        .input-area input:focus {
            border-color: #1e40af;
        }
        .input-area button {
            background: #1e40af;
            color: white;
            border: none;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">
            🎓 Lahore University of Excellence (LUE)
        </div>
        <div id="chat-box" class="chat-box"></div>
        <div class="input-area">
            <input type="text" id="user-input" 
                   placeholder="Ask about admissions, requirements..." 
                   onkeypress="if(event.key === 'Enter') sendMessage()">
            <button onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        function appendMessage(sender, text) {
            const chatBox = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `message ${sender}-message`;
            div.textContent = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('user-input');
            const message = input.value.trim();
            
            if (!message) return;

            appendMessage('user', message);
            input.value = '';

            // Typing indicator
            const typing = document.createElement('div');
            typing.id = 'typing';
            typing.className = 'message bot-message';
            typing.textContent = 'Typing...';
            document.getElementById('chat-box').appendChild(typing);
            document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;

            fetch('/get_response', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message })
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById('typing').remove();
                appendMessage('bot', data.response);
            })
            .catch(() => {
                document.getElementById('typing').remove();
                appendMessage('bot', "Sorry, I'm having trouble responding right now.");
            });
        }

        // Welcome message
        window.onload = () => {
            appendMessage('bot', "Assalamualaikum! 👋 I'm your LUE Admission Assistant. Ask me anything about admission requirements, deadlines, programs, fees, or the application process! 🎓");
        };
    </script>
</body>
</html>
