<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUE Admission RAG Bot - Lab 12</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #1e2937;
        }
        .chat-container {
            width: 460px;
            height: 700px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.35);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: linear-gradient(90deg, #1e40af, #3b82f6);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 15.5px;
            line-height: 1.5;
            word-wrap: break-word;
        }
        .user-message {
            align-self: flex-end;
            background: #1e40af;
            color: white;
            border-bottom-right-radius: 6px;
        }
        .bot-message {
            align-self: flex-start;
            background: #e2e8f0;
            color: #1e2937;
            border-bottom-left-radius: 6px;
        }
        .input-area {
            padding: 16px;
            background: white;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 10px;
        }
        .input-area input {
            flex: 1;
            padding: 16px 20px;
            border: 2px solid #cbd5e1;
            border-radius: 50px;
            font-size: 16px;
            outline: none;
        }
        .input-area input:focus {
            border-color: #1e40af;
        }
        .input-area button {
            background: #1e40af;
            color: white;
            border: none;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .typing {
            font-style: italic;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">
            🎓 LUE Admission RAG Bot (Lab 12)
        </div>
        <div id="chat-box" class="chat-box"></div>
        
        <div class="input-area">
            <input type="text" id="user-input" 
                   placeholder="Ask about admission, requirements, deadlines..." 
                   onkeypress="if(event.key === 'Enter') sendMessage()">
            <button onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');

        function appendMessage(sender, text) {
            const div = document.createElement('div');
            div.className = `message ${sender}-message`;
            div.innerHTML = text.replace(/\n/g, '<br>');
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function showTypingIndicator() {
            const typingDiv = document.createElement('div');
            typingDiv.id = 'typing-indicator';
            typingDiv.className = `message bot-message typing`;
            typingDiv.textContent = 'Thinking...';
            chatBox.appendChild(typingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
            return typingDiv;
        }

        function removeTypingIndicator() {
            const typing = document.getElementById('typing-indicator');
            if (typing) typing.remove();
        }

        function sendMessage() {
            const input = document.getElementById('user-input');
            const message = input.value.trim();

            if (!message) return;

            // Add user message
            appendMessage('user', message);
            input.value = '';

            // Show typing indicator
            const typingIndicator = showTypingIndicator();

            // Send request to Flask backend
            fetch('/get_response', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ message: message })
            })
            .then(response => response.json())
            .then(data => {
                removeTypingIndicator();
                appendMessage('bot', data.response);
            })
            .catch(error => {
                removeTypingIndicator();
                appendMessage('bot', "Sorry, something went wrong. Please try again.");
                console.error('Error:', error);
            });
        }

        // Welcome Message when page loads
        window.onload = function() {
            appendMessage('bot', 
                `Assalamualaikum! 👋<br><br>
                I am your intelligent <strong>LUE Admission RAG Bot (Lab 12)</strong>.<br><br>
                Ask me anything about:<br>
                • Admission requirements<br>
                • Application deadlines<br>
                • Programs offered<br>
                • Fees & Scholarships<br>
                • How to apply<br><br>
                How can I help you today? 🎓`
            );
        };
    </script>
</body>
</html>
