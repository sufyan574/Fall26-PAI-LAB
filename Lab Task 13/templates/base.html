<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart AI Resume Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" rel="stylesheet">
    <script>
        // Tailwind Dark Mode Script
        tailwind.config = {
            content: [],
            darkMode: 'class',
        }
    </script>
</head>
<body class="bg-gray-100 text-gray-900 dark:bg-gray-900 dark:text-gray-100 transition-colors">
    <div class="min-h-screen flex flex-col">
        <header class="bg-gradient-to-r from-indigo-600 via-purple-600 to-blue-600 text-white p-4 shadow-md">
            <div class="container mx-auto flex justify-between items-center">
                <a href="/" class="text-2xl font-bold">SmartAI Resume</a>
                <nav class="space-x-6">
                    <a href="/" class="hover:underline">Home</a>
                    <a href="/generate" class="hover:underline">Generate New</a>
                    <a href="/history" class="hover:underline">My History</a>
                </nav>
                <button id="theme-toggle" 
                        class="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg text-sm font-medium transition-all flex items-center gap-2">
                    <span id="theme-icon">🌙</span>
                    <span>Dark Mode</span>
                </button>
            </div>
        </header>

        <main class="flex-grow container mx-auto p-4">
            {% block content %}{% endblock %}
        </main>

        <footer class="bg-gray-900 text-gray-400 py-6 text-center text-sm">
            <p>SmartAI Resume Generator</p>
        </footer>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <script>
        AOS.init();

        // Dark Mode Toggle
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const html = document.documentElement;

        // Load saved theme
        if (localStorage.getItem('theme') === 'dark' || 
            (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            html.classList.add('dark');
            themeIcon.textContent = '☀️';
        }

        themeToggle.addEventListener('click', () => {
            html.classList.toggle('dark');
            
            if (html.classList.contains('dark')) {
                localStorage.setItem('theme', 'dark');
                themeIcon.textContent = '☀️';
            } else {
                localStorage.setItem('theme', 'light');
                themeIcon.textContent = '🌙';
            }
        });
    </script>
</body>
</html>
