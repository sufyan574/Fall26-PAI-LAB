{% extends 'base.html' %}

{% block content %}
<div class="max-w-4xl mx-auto bg-white dark:bg-gray-800 shadow-md rounded-lg p-6">
    <h2 class="text-2xl font-bold mb-4">Generate Resume & Cover Letter</h2>
    <form method="POST" action="/generate">
        <!-- Personal Information -->
        <div class="mb-8">
            <h3 class="text-lg font-semibold mb-2">Personal Information</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium mb-2">Name</label>
                    <input type="text" name="name" class="w-full border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500" required>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Email</label>
                    <input type="email" name="email" class="w-full border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500" required>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Phone</label>
                    <input type="text" name="phone" class="w-full border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500" required>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">LinkedIn</label>
                    <input type="url" name="linkedin" class="w-full border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Location</label>
                    <input type="text" name="location" class="w-full border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500">
                </div>
            </div>
        </div>

        <!-- Education -->
        <div class="mb-4">
            <label class="block text-sm font-medium mb-2">Education</label>
            <textarea name="education" class="w-full border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500" rows="3"></textarea>
        </div>

        <!-- Work Experience -->
        <div class="mb-4">
            <label class="block text-sm font-medium mb-2">Work Experience</label>
            <textarea name="experience" class="w-full border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500" rows="3"></textarea>
        </div>

        <!-- Skills -->
        <div class="mb-4">
            <label class="block text-sm font-medium mb-2">Skills (comma-separated)</label>
            <input type="text" name="skills" class="w-full border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500">
        </div>

        <!-- Target Job Title -->
        <div class="mb-4">
            <label class="block text-sm font-medium mb-2">Target Job Title</label>
            <input type="text" name="target_job_title" class="w-full border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500">
        </div>

        <!-- Job Description -->
        <div class="mb-4">
            <label class="block text-sm font-medium mb-2">Job Description</label>
            <textarea name="job_description" class="w-full border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500" rows="5"></textarea>
        </div>

        <!-- Company Name -->
        <div class="mb-4">
            <label class="block text-sm font-medium mb-2">Company Name (optional)</label>
            <input type="text" name="company_name" class="w-full border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500">
        </div>

        <!-- Template Selection -->
        <div class="mb-8">
            <h3 class="text-lg font-semibold mb-2">Select Resume Template</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <label class="block border rounded-lg p-4 cursor-pointer hover:shadow-md template-card">
                    <input type="radio" name="template_type" value="ats" class="hidden" required>
                    <h4 class="text-lg font-bold">ATS Friendly</h4>
                    <p class="text-sm text-gray-600">Clean and simple design optimized for ATS systems.</p>
                </label>
                <label class="block border rounded-lg p-4 cursor-pointer hover:shadow-md template-card">
                    <input type="radio" name="template_type" value="professional" class="hidden">
                    <h4 class="text-lg font-bold">Professional</h4>
                    <p class="text-sm text-gray-600">Traditional look with a formal layout.</p>
                </label>
                <label class="block border rounded-lg p-4 cursor-pointer hover:shadow-md template-card">
                    <input type="radio" name="template_type" value="modern" class="hidden">
                    <h4 class="text-lg font-bold">Modern</h4>
                    <p class="text-sm text-gray-600">Nice spacing and contemporary design.</p>
                </label>
                <label class="block border rounded-lg p-4 cursor-pointer hover:shadow-md template-card">
                    <input type="radio" name="template_type" value="creative" class="hidden">
                    <h4 class="text-lg font-bold">Creative</h4>
                    <p class="text-sm text-gray-600">Stylish design with a touch of creativity.</p>
                </label>
            </div>
        </div>

        <div class="flex justify-end">
            <button type="submit" id="generate-btn" class="bg-indigo-600 text-white px-4 py-2 rounded-md shadow hover:bg-indigo-700">Generate</button>
        </div>
    </form>
</div>

<!-- Loading Spinner -->
<div id="loading-overlay" class="hidden fixed inset-0 bg-gray-900 bg-opacity-75 flex items-center justify-center z-50">
    <div class="text-center">
        <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
        <p class="text-white text-lg">AI is crafting your professional resume and cover letter... Please wait</p>
    </div>
</div>

<script>
    const form = document.querySelector('form');
    const loadingOverlay = document.getElementById('loading-overlay');
    const generateBtn = document.getElementById('generate-btn');

    form.addEventListener('submit', () => {
        generateBtn.disabled = true;
        loadingOverlay.classList.remove('hidden');
    });
</script>

<script>
    const templateCards = document.querySelectorAll('.template-card');
    templateCards.forEach(card => {
        card.addEventListener('click', () => {
            templateCards.forEach(c => c.classList.remove('ring-4', 'ring-indigo-500'));
            card.classList.add('ring-4', 'ring-indigo-500');
            card.querySelector('input').checked = true;
        });
    });
</script>

<style>
    .loader {
        border-color: #6366f1 transparent transparent transparent;
        animation: spin 1.2s linear infinite;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    .template-card:hover {
        border-color: #6366f1;
    }
</style>
{% endblock %}
