{% extends 'base.html' %}

{% block content %}
<div class="max-w-6xl mx-auto bg-white dark:bg-gray-800 shadow-md rounded-lg p-6">
    <h2 class="text-2xl font-bold mb-4">My History</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6" data-aos="fade-up">
        {% for record in history %}
        <div class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow-lg backdrop-blur-md">
            <h3 class="text-lg font-semibold">{{ record.target_job_title }}</h3>
            <p class="text-sm text-gray-500">{{ record.created_at }}</p>
            <p class="mt-2">Company: {{ record.company_name or 'N/A' }}</p>
            <p class="mt-2">Template Used: {{ record.template_type }}</p>
            <div class="mt-4 flex gap-2">
                <a href="/download/{{ record.id }}/resume" class="bg-indigo-600 text-white px-4 py-2 rounded-md shadow hover:bg-indigo-700">Download Resume</a>
                <a href="/download/{{ record.id }}/cover_letter" class="bg-indigo-600 text-white px-4 py-2 rounded-md shadow hover:bg-indigo-700">Download Cover Letter</a>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
