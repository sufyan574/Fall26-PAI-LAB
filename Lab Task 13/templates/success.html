{% extends 'base.html' %}

{% block content %}
<div class="max-w-4xl mx-auto bg-gray-100 dark:bg-gray-800 shadow-md rounded-lg p-6">
    <div class="text-center mb-6">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-green-500 mx-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2l4-4m0 0a9 9 0 11-6.32 15.9A9 9 0 0112 3z" />
        </svg>
        <h2 class="text-3xl font-bold mt-4">Success!</h2>
        <p class="text-lg text-gray-600 dark:text-gray-300">Your resume and cover letter have been generated successfully.</p>
    </div>

    <div class="flex flex-col md:flex-row gap-8" data-aos="fade-in">
        <div class="flex-1 bg-white dark:bg-gray-900 p-6 rounded-lg shadow-lg border border-gray-300">
            <h3 class="text-2xl font-semibold mb-4">Resume</h3>
            <div class="prose bg-gray-50 dark:bg-gray-800 rounded-md shadow overflow-auto max-h-96 p-4">
                <pre class="whitespace-pre-wrap text-sm">{{ resume }}</pre>
            </div>
            <div class="mt-6 flex justify-center">
                <a href="/download/{{ resume_pdf }}" download class="bg-gradient-to-r from-green-500 to-teal-500 text-white px-6 py-3 rounded-lg shadow-lg hover:scale-105 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                    </svg>
                    Download Resume PDF
                </a>
            </div>
        </div>

        <div class="flex-1 bg-white dark:bg-gray-900 p-6 rounded-lg shadow-lg border border-gray-300">
            <h3 class="text-2xl font-semibold mb-4">Cover Letter</h3>
            <div class="prose bg-gray-50 dark:bg-gray-800 rounded-md shadow overflow-auto max-h-96 p-4">
                <pre class="whitespace-pre-wrap text-sm">{{ cover_letter }}</pre>
            </div>
            <div class="mt-6 flex justify-center">
                <a href="/download/{{ cover_letter_pdf }}" download class="bg-gradient-to-r from-green-500 to-teal-500 text-white px-6 py-3 rounded-lg shadow-lg hover:scale-105 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                    </svg>
                    Download Cover Letter PDF
                </a>
            </div>
        </div>
    </div>

    <div class="mt-8 flex justify-center gap-4">
        <a href="/" class="bg-indigo-600 text-white px-6 py-3 rounded-lg shadow hover:bg-indigo-700">Back to Home</a>
        <a href="/generate" class="bg-green-600 text-white px-6 py-3 rounded-lg shadow hover:bg-green-700">Generate Another</a>
    </div>
</div>

<script>
function copyToClipboard(text) {
    navigator.clipboard.writeText(text).then(() => {
        const toast = document.createElement('div');
        toast.textContent = 'Copied to clipboard!';
        toast.className = 'fixed bottom-4 right-4 bg-green-500 text-white px-4 py-2 rounded shadow';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    });
}
</script>
{% endblock %}
